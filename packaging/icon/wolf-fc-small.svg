<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Small-size variant for 16/32 px raster. A single big "W" — even
       "WFC" smears at 16 px; one letter survives the downscale and keeps
       the brand colors readable. -->
  <rect x="14" y="14" width="228" height="228" rx="14" ry="14"
        fill="#7B2A1F" stroke="#1E3A8A" stroke-width="14"/>
  <text x="128" y="186" text-anchor="middle"
        font-family="DejaVu Sans, Arial, sans-serif" font-weight="900" font-size="170"
        fill="#D4AF37">W</text>
</svg>
